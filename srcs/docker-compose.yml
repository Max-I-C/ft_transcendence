
services:
  nginx:
    container_name: nginx
    image: nginx
    build: 
      context: ./requirements
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - frontend:/frontend_dist
      - ./requirements/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - transcendence
    depends_on:
      - backend
    ports:
      - "443:443"
    restart: on-failure
    user: root

  backend:
    container_name: backend
    build:
      context: ./requirements/backend
    networks:
      - transcendence
    restart: unless-stopped
    expose:
      - "3000"

volumes:
  frontend:
    driver: local

networks:
 transcendence:
  driver: bridge

